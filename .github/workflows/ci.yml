name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: mkdir -p ../kami-engine && git clone --depth 1 https://github.com/kotoba-lang/kami-engine-sdk-clj.git ../kami-engine/kami-engine-sdk-clj
      - run: git clone --depth 1 https://github.com/kotoba-lang/kasane.git ../kasane
      - run: git clone --depth 1 https://github.com/kotoba-lang/canvaskit.git ../canvaskit
      - run: clojure -M:test
