<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>freeboard</title>
  <style>
    html,body { margin:0; height:100%; background:#f0ead6; overflow:hidden; } /* nintendo-cream */
    #stage { position:fixed; inset:0; touch-action:none; }
    #toolbar { position:fixed; top:12px; left:12px; display:flex; gap:8px; font:14px system-ui; }
    #toolbar button { padding:6px 12px; border:1px solid #caa83a; border-radius:8px; background:#fff7d6; cursor:pointer; }
    #toolbar button.active { background:#ffeb8a; box-shadow:0 0 0 2px #caa83a; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="toolbar">
    <button data-tool="select" class="active">▦ select</button>
    <button id="add-sticky" data-tool="sticky">＋ sticky</button>
    <button data-tool="shape">▭ shape</button>
    <button data-tool="text">T text</button>
    <button data-tool="connector">↘ connector</button>
    <button data-tool="pen">✎ pen</button>
  </div>

  <p id="status">freeboard CLJC/render-IR authority lives under src/.</p>
</body>
</html>
